<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}English-Ukrainian Dictionary{% endblock %}</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f7fb;
      color: #132238;
    }
    .container {
      width: min(980px, 92vw);
      margin: 2rem auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 28px rgba(19, 34, 56, 0.08);
      padding: 1.5rem;
    }
    h1, h2 {
      margin-top: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.95rem;
    }
    th, td {
      border-bottom: 1px solid #e6edf7;
      padding: 0.7rem;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f7faff;
    }
    .form-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin: 1rem 0;
      flex-wrap: wrap;
    }
    input[type="text"], select {
      flex: 1;
      min-width: 230px;
      border: 1px solid #bfd0e5;
      border-radius: 8px;
      padding: 0.65rem 0.75rem;
      font-size: 0.95rem;
      background: #fff;
    }
    button, .btn {
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      background: #0f5cb3;
      color: #fff;
      text-decoration: none;
      cursor: pointer;
      font-size: 0.95rem;
      display: inline-block;
    }
    .messages {
      list-style: none;
      padding: 0;
      margin: 1rem 0;
    }
    .messages li {
      padding: 0.7rem;
      border-radius: 8px;
      background: #fff2f2;
      color: #8a1f1f;
      border: 1px solid #ffd0d0;
      margin-bottom: 0.5rem;
    }
    .muted {
      color: #516680;
    }
    .word-link {
      color: #0f5cb3;
      font-weight: 600;
      text-decoration: none;
    }
    .direction-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #edf5ff;
      border: 1px solid #c8defb;
      color: #0d417a;
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }
    .pos-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 0.12rem 0.5rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
    }
    .pos-noun { background: #eaf6ff; color: #19588f; border-color: #c5e1f5; }
    .pos-verb { background: #ebfff0; color: #1a6d38; border-color: #c9edd4; }
    .pos-adjective { background: #fff7e8; color: #8b5d18; border-color: #f0dfbb; }
    .pos-adverb { background: #f3efff; color: #4f3a97; border-color: #d9cff9; }
    .pos-pronoun { background: #fff0f4; color: #963757; border-color: #f6cedc; }
    .pos-preposition { background: #effaf9; color: #1e6560; border-color: #ccece8; }
    .pos-conjunction { background: #f8f3ea; color: #77613a; border-color: #e8dcc7; }
    .pos-interjection { background: #ffeef0; color: #9a2f3f; border-color: #f5ccd2; }
    .pos-phrase { background: #f1f3f6; color: #425164; border-color: #dce3ea; }
    .pos-other { background: #f4f4f4; color: #545454; border-color: #d9d9d9; }
    .option-list {
      padding-left: 1rem;
      margin: 0;
      display: grid;
      gap: 0.35rem;
    }
    .option-text {
      font-weight: 600;
      margin-right: 0.35rem;
    }
    .usage-note {
      color: #5c708a;
      font-size: 0.88rem;
      margin-left: 0.35rem;
    }
    @media (max-width: 760px) {
      table {
        font-size: 0.88rem;
      }
      th, td {
        padding: 0.55rem;
      }
      .container {
        padding: 1rem;
      }
      input[type="text"], select {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>

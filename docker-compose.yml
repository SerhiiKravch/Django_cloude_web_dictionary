services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dictionary}
      POSTGRES_USER: ${DB_USER:-dictionary_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dictionary_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8002:8002"
    depends_on:
      - db
    volumes:
      - .:/app
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000"]

volumes:
  postgres_data:
